<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <filter id="badge-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="rgba(0,0,0,0.6)"/>
    </filter>
  </defs>

  <!-- Base icon: dark rounded square -->
  <rect x="61.44" y="61.44" width="901.12" height="901.12"
        rx="162.2" ry="162.2"
        fill="#2a2a2a"/>

  <!-- Tint overlay -->
  <rect x="61.44" y="61.44" width="901.12" height="901.12"
        rx="162.2" ry="162.2"
        fill="rgba(139,92,246,0.3)"/>

  <!-- REAPER-style waveform hint (subtle) -->
  <line x1="256" y1="430" x2="768" y2="430"
        stroke="rgba(255,255,255,0.15)" stroke-width="20.48"/>

  <!-- Badge pill -->
  <rect x="264.2" y="746.3" width="495.6" height="144.18"
        rx="72.09" ry="72.09"
        fill="rgba(139,92,246,0.95)"
        stroke="rgb(69,46,123)" stroke-width="1.5"
        filter="url(#badge-shadow)"/>

  <!-- Badge text -->
  <text x="512" y="818.4"
        font-family="system-ui, -apple-system, sans-serif"
        font-weight="bold" font-size="79.3"
        fill="white" text-anchor="middle" dominant-baseline="central">
    FTS
  </text>
</svg>
