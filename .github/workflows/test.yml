name: FTS Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NIXPKGS_ALLOW_UNFREE: 1

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Allow unprivileged user namespaces (bwrap needs this)
        run: |
          # Ubuntu 24.04+ blocks unprivileged user namespaces via AppArmor
          # buildFHSEnv uses bubblewrap which requires them
          if [ -f /proc/sys/kernel/apparmor_restrict_unprivileged_userns ]; then
            echo 0 | sudo tee /proc/sys/kernel/apparmor_restrict_unprivileged_userns
          fi
          # Older kernels use this sysctl instead
          sudo sysctl -w kernel.unprivileged_userns_clone=1 2>/dev/null || true

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: cachix/cachix-action@v15
        with:
          name: fasttrackstudio
          # authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
        continue-on-error: true

      - name: Build FTS test environment (CI preset)
        run: nix build .#fts-test-ci --impure

      - name: Smoke test — REAPER starts headless
        run: nix run .#fts-test-ci --impure -- ./ci/test.sh

